name: Deploy Site

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'results/**'

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.157.0'
          extended: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Generate new-leaderboard data
        run: python3 scripts/gen_new_leaderboard_data.py

      - name: Build Hugo site (archived under /old/)
        working-directory: site
        run: |
          hugo mod tidy
          hugo --minify --baseURL "https://www.http-arena.com/old/" --destination old_build

      - name: Assemble — new board at root, Hugo site under /old/
        working-directory: site
        run: |
          rm -rf public && mkdir public
          mv old_build public/old
          cp public/old/new-leaderboard/index.html public/index.html
          cp public/old/new-leaderboard/data.js public/data.js
          cp public/old/new-leaderboard/docs.js public/docs.js
          cp root/404.html public/404.html   # path-preserving redirects: old links -> /old/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
