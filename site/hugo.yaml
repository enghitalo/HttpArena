baseURL: https://www.http-arena.com
languageCode: en-us
title: HttpArena

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true

menu:
  main:
    - name: Leaderboard
      pageRef: /leaderboard
      weight: 1
    - name: Timeline
      url: https://timeline.http-arena.com
      weight: 1.5
    - name: Knowledge Base
      pageRef: /docs
      weight: 2
    - name: RFC Compliance
      weight: 3
      url: https://mda2av.github.io/Http11Probe/
    - name: New Leaderboard
      weight: 4
      url: /new-leaderboard/
    - name: Search
      weight: 5
      params:
        type: search
    - name: Theme
      weight: 5.5
      params:
        type: theme-toggle
    - name: Discord
      weight: 6
      url: https://discord.gg/H84B5ZqDXR
      params:
        icon: discord
    - name: GitHub
      weight: 7
      url: https://github.com/MDA2AV/HttpArena
      params:
        icon: github

params:
  description: "HTTP framework benchmark arena"
  theme:
    default: system
    displayToggle: false
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      link: /
      light: images/logo.svg
      dark: images/logo-dark.svg
      width: 28
      height: 28
  footer:
    displayCopyright: false
    displayPoweredBy: false
